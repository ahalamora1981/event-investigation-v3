services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8220:80"
    environment:
      - VITE_API_URL=http://localhost:8210
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8210:8000"
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
